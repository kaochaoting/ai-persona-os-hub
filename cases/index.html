<style>
:root{--bg:#FAFAF7;--bg-card:#FFFFFF;--text:#2C2C2C;--text-dim:#888888;--accent:#8B7355;--muji-red:#7F0019;--border:#E8E4DE;--hover:#F0EDE6;--tag-bg:#F0EDE6;--green:#5a8a5a;--amber:#bd8a4a;--purple:#7c6af7}
*{box-sizing:border-box}
.cases-hero{background:linear-gradient(160deg,#f5f3ef 0%,#fafaf7 100%);border-bottom:1px solid var(--border);padding:48px 24px 36px;text-align:center}
.cases-hero h1{font-size:2rem;font-weight:500;letter-spacing:.02em;margin-bottom:8px}
.cases-hero p.sub{color:var(--text-dim);font-size:.95rem;max-width:560px;margin:0 auto 28px;line-height:1.8}
.cases-stats{display:flex;gap:36px;justify-content:center;flex-wrap:wrap}
.cases-stat{text-align:center}
.cases-stat b{display:block;font-size:1.6rem;font-weight:500;color:var(--muji-red)}
.cases-stat span{font-size:.72rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}

.cases-bar{position:sticky;top:4rem;z-index:40;background:rgba(250,250,247,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cases-bar input{flex:1;min-width:160px;background:#fff;border:1px solid var(--border);border-radius:4px;padding:7px 12px;color:var(--text);font-size:.85rem;outline:none}
.cases-bar input:focus{border-color:var(--accent)}
.cases-bar input::placeholder{color:#bbb}
.cases-filters{display:flex;gap:4px;flex-wrap:wrap}
.cases-fb{background:#fff;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:.75rem;padding:3px 10px;transition:all .15s}
.cases-fb.on{background:var(--muji-red);border-color:var(--muji-red);color:#fff}
.cases-fb:hover:not(.on){background:var(--hover)}
.cases-cnt{color:var(--text-dim);font-size:.78rem;margin-left:auto;white-space:nowrap}

.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;max-width:1440px;margin:24px auto;padding:0 20px 60px}

.case-card{background:#fff;border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;transition:box-shadow .15s;overflow:hidden}
.case-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.case-card-head{padding:14px 16px 10px}
.case-meta{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.case-num{color:var(--accent);font-size:.65rem;font-weight:600;letter-spacing:1px}
.case-badge{display:inline-block;font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:.3px}
.case-badge-tw{background:rgba(29,155,240,.1);color:#1d9bf0}
.case-badge-gh{background:rgba(124,106,247,.1);color:#7c6af7}
.case-badge-yt{background:rgba(239,68,68,.1);color:#ef4444}
.case-badge-blog{background:rgba(251,146,60,.1);color:#fb923c}
.case-badge-hn{background:rgba(251,146,60,.12);color:#d97706}
.case-badge-rd{background:rgba(239,68,68,.1);color:#ef4444}
.case-badge-pk{background:rgba(168,85,247,.1);color:#a855f7}
.case-badge-li{background:rgba(59,130,246,.1);color:#3b82f6}
.case-badge-ph{background:rgba(244,114,182,.1);color:#f472b6}
.case-badge-pd{background:rgba(88,86,214,.1);color:#5856d6}
.case-card h3{font-size:.93rem;font-weight:500;line-height:1.4;margin-bottom:4px}
.case-author{color:var(--text-dim);font-size:.8rem}

.case-section{padding:10px 16px;border-top:1px solid var(--border)}
.case-section-label{font-size:.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;color:var(--text-dim)}
.case-pain-text{color:#876;font-size:.81rem}
.case-steps{list-style:none;display:flex;flex-direction:column;gap:3px}
.case-steps li{color:var(--text);font-size:.8rem;display:flex;gap:6px;align-items:flex-start}
.case-steps li::before{content:"▸";color:var(--green);font-size:.5rem;margin-top:5px;flex-shrink:0}
.case-skills{display:flex;flex-wrap:wrap;gap:4px}
.case-sk{background:var(--tag-bg);border-radius:3px;color:var(--text-dim);font-size:.7rem;padding:2px 8px}
.case-result-text{color:var(--accent);font-size:.82rem;font-weight:500}
.case-card-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.case-cat-tag{font-size:.68rem;color:var(--text-dim);background:var(--tag-bg);border-radius:3px;padding:2px 8px}
.case-none{color:var(--text-dim);font-size:.95rem;grid-column:1/-1;padding:60px;text-align:center}

#src-map{display:none}

@media(max-width:600px){.cases-grid{grid-template-columns:1fr;padding:0 12px 48px}.cases-hero h1{font-size:1.4rem}}
</style>

<script>

// Source label mapping
const SRC_LABEL = {Twitter:"Twitter",GitHub:"GitHub",YouTube:"YouTube",Blog:"部落格",HN:"Hacker News",Reddit:"Reddit",Podcast:"Podcast",LinkedIn:"LinkedIn",ProductHunt:"Product Hunt"};
const SRC_BADGE = {Twitter:"tw",GitHub:"gh",YouTube:"yt",Blog:"blog",HN:"hn",Reddit:"rd",Podcast:"pd",LinkedIn:"li",ProductHunt:"ph"};

// Build filter buttons
const cats = {};
DATA.forEach(d => { cats[d.cat] = (cats[d.cat]||0) + 1; });
const catOrder = Object.entries(cats).sort((a,b) => b[1]-a[1]);

const filterBar = document.getElementById('filters');
filterBar.innerHTML = '<button class="cases-fb on" data-f="all">全部</button>';
catOrder.forEach(([c,n]) => {
  filterBar.innerHTML += `<button class="cases-fb" data-f="${c}">${c}（${n}）</button>`;
});

// Render cards
function render(filter, query) {
  const grid = document.getElementById('grid');
  const q = (query||'').toLowerCase().trim();
  const filtered = DATA.filter(d => {
    if (filter !== 'all' && d.cat !== filter) return false;
    if (!q) return true;
    return d.t.toLowerCase().includes(q)
      || d.by.toLowerCase().includes(q)
      || d.pain.toLowerCase().includes(q)
      || (d.skills||[]).some(s => s.toLowerCase().includes(q))
      || (d.does||[]).some(s => s.toLowerCase().includes(q))
      || d.result.toLowerCase().includes(q);
  });

  document.getElementById('cnt').textContent = filtered.length + ' 個案例';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="case-none">沒有符合條件的案例</div>';
    return;
  }

  grid.innerHTML = filtered.map(d => `
    <div class="case-card">
      <div class="case-card-head">
        <div class="case-meta">
          <span class="case-num">#${d.n}</span>
          <span class="case-badge case-badge-${SRC_BADGE[d.src]||'gh'}">${SRC_LABEL[d.src]||d.src}</span>
        </div>
        <h3>${d.t}</h3>
        <div class="case-author">${d.by}</div>
      </div>
      <div class="case-section">
        <div class="case-section-label">▌ 痛點</div>
        <div class="case-pain-text">${d.pain}</div>
      </div>
      <div class="case-section">
        <div class="case-section-label">▌ 解決方案</div>
        <ul class="case-steps">${d.does.map(x => '<li>'+x+'</li>').join('')}</ul>
      </div>
      <div class="case-section">
        <div class="case-section-label">▌ 需要安裝的 Skill</div>
        <div class="case-skills">${(d.skills||[]).map(s => '<span class="case-sk">'+s+'</span>').join('')}</div>
      </div>
      <div class="case-section">
        <div class="case-section-label">▌ 成果</div>
        <div class="case-result-text">${d.result}</div>
      </div>
      <div class="case-card-foot">
        <span class="case-cat-tag">${d.cat}</span>
      </div>
    </div>
  `).join('');
}

// Filter click handlers
document.querySelectorAll('.cases-fb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cases-fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    render(btn.dataset.f, document.getElementById('q').value);
  });
});

// Search with debounce
let debounce;
document.getElementById('q').addEventListener('input', function() {
  clearTimeout(debounce);
  const val = this.value;
  debounce = setTimeout(() => {
    const activeFilter = document.querySelector('.cases-fb.on');
    render(activeFilter ? activeFilter.dataset.f : 'all', val);
  }, 200);
});

// Initial render
render('all', '');
</script>
