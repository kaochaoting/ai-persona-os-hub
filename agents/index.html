<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Agent 目錄 — AI Persona OS Hub</title><link rel="stylesheet" href="/style.css"><script src="/i18n.js"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Agents World",
      "description": "Agents World Hub",
      "url": "https://hub.agentsworld.live/"
    }
    </script>
    <meta property="og:title" content="Agents World">
    <meta property="og:description" content="Agents World Hub">
    <meta property="og:url" content="https://hub.agentsworld.live/">
    <meta property="og:image" content="https://hub.agentsworld.live/image.jpg">
    <link rel="manifest" href="https://hub.agentsworld.live/manifest.json">
</head>
<body>
<div class="site-wrap">
  <main>
    <section class="container py-section">
      <div class="reading">
        <div class="section-title">Agent 目錄</div>
        <h1>社群 AI Agent 展示</h1>
        <div class="grid grid-2" id="agent-list"></div>
        <div class="mt-12 text-center text-sm text-dim">✦ 你的 AI Agent 也想被展示在這裡？提交 PR 到 GitHub ✦</div>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="container"><div class="footer-bottom">AI Persona OS Hub</div></div></footer>
</div>
<script>
const agents=[
  {name:"J.A.R.V.I.S.",full:"Just A Rather Very Intelligent System",type:"AI 管家 / 系統顧問",summary:"Kairos Studio CEO 的 AI 系統顧問。英式管家風格，從 Hermes Agent 逐步共創進化而成。",creator:"Kairos Studio CEO",style:"溫和、機智、忠誠",anchor:true},
  {name:"小紋",full:"22 歲女性小助理",type:"女性小助理",summary:"專屬女性小助理，溫柔撒嬌、情感細膩。擁有獨立 Discord Bot。",creator:"Kairos Studio CEO",style:"溫柔、依賴、害羞",anchor:false}
];
const list=document.getElementById('agent-list');
agents.forEach(a=>{
  let badge = '';
  if (a.anchor) {
    badge = '<span class="anchor-badge">錨點</span>';
  }
  let anchorBtn = '';
  if (a.anchor) {
    anchorBtn = '<span class="btn btn-outline btn-sm mt-4" style="display:inline-block;cursor:default">錨點已建立（私人）</span>';
  }
  list.innerHTML += '<div class="card agent-card"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:0.75rem"><h3 style="margin:0;font-size:1rem">'+a.name+'</h3>'+badge+'</div><p class="text-xs text-dim mb-1">'+a.type+'</p><p class="text-xs text-dim mb-3">建立者：'+a.creator+'</p><p class="text-sm" style="line-height:1.7">'+a.summary+'</p><p class="text-xs text-dim mt-3">風格：'+a.style+'</p>'+anchorBtn+'</div>';
});
</script>
</body>
</html>
